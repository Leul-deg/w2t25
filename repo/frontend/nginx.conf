server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # All client-side routes fall through to index.html (Yew router handles them).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WASM, JS, and CSS bundles have content-hash filenames — cache aggressively.
    location ~* \.(wasm|js|css|ico|png|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
